<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b16" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>LocalGPT • Chat</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/style.css?v={{ static_version }}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-copy">
          <p class="eyebrow">Welcome back</p>
          <h1>Hello, {{ user }}</h1>
          <p class="lead">One simple prompt in the center. Click it to reveal the chat room below.</p>
        </div>
        <button id="welcome-prompt" class="welcome-prompt" type="button">Start a new conversation</button>
      </div>

      <div class="chat-container" id="chat-container" aria-hidden="true">
        <div class="top-bar">
          <div class="brand-pill">
            <span>LG</span>
            <strong>LocalGPT</strong>
          </div>
          <div class="session-status">
            <span class="session-text">Signed in as</span>
            <strong>{{ user }}</strong>
          </div>
          <a class="logout-link" href="/logout">Log out</a>
        </div>

        <section id="conversation" class="conversation">
          {% for message in history %}
            <div class="message {{ 'user' if message.role == 'user' else 'assistant' }}">
              <div class="message-role">{{ 'You' if message.role == 'user' else 'Assistant' }}</div>
              <div class="message-content">{{ message.content | e }}</div>
            </div>
          {% endfor %}
        </section>

        <form id="chat-form" class="composer">
          <div class="textarea-wrapper">
            <textarea id="prompt" name="prompt" rows="1" placeholder="Type a message and press Enter. Shift+Enter for a new line."></textarea>
          </div>
          <button type="submit" class="primary-button send-button" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script>
      const currentUser = {{ user|tojson }};
    </script>
    <script src="/static/app.js?v={{ static_version }}"></script>
  </body>
</html>
